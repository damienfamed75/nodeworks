# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build

# PR builds and pushes to every branch EXCEPT main. Main pushes are handled by
# release.yml (which bumps the version, builds, and publishes a release), running
# both on the same push wastes CI minutes and can race on the VERSION bump commit.
on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build (compiles + runs tests)
        run: ./gradlew build
      - name: upload test reports
        # Run regardless of build result, a failed test still produces a useful report.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestReports
          path: common/build/reports/tests/test/
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/
