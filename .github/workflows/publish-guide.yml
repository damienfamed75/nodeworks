# Renders the in-game guidebook (`guidebook/`) to a static HTML site via
# GuideME's `SiteExporter`, then publishes it to GitHub Pages. Mirrors AE2's
# `export_guide.yml` setup, with two differences:
#   * Output goes to GitHub Pages instead of an S3/R2 bucket.
#   * No nightly schedule, the export only runs on `main` pushes (and manual
#     `workflow_dispatch`) since the rendered site doesn't change without a
#     guidebook content change.
#
# The export needs OpenGL because `<GameScene>` blocks are real 3D renders
# captured to PNGs, that's why the runner installs `xvfb` + `libgl1-mesa-dri`
# and wraps the Gradle invocation in `xvfb-run`. `DRI_PRIME=0` pins to software
# rendering so we don't depend on GPU passthrough.

name: Publish Guidebook

on:
  push:
    branches:
      - main
    paths:
      # Only re-export when something that affects the rendered guide changes:
      # the markdown/asset content itself, the export run config, or the
      # workflow file. Code-only PRs don't trigger a 5-minute Pages deploy.
      - 'guidebook/**'
      - 'neoforge/build.gradle.kts'
      - '.github/workflows/publish-guide.yml'
  workflow_dispatch: { }

# Pages deployments must serialize: a second push while one is in flight would
# race on the deploy step. `cancel-in-progress: false` lets the in-flight
# deploy finish before the next one starts, avoiding partial uploads.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  export:
    name: Export guide to static HTML
    runs-on: ubuntu-24.04
    steps:
      - name: Install headless OpenGL stack
        # xvfb provides a virtual framebuffer so LWJGL/GLFW can create a
        # context, libgl1-mesa-dri is the software renderer those calls hit.
        run: sudo apt-get update && sudo apt-get install -y xvfb libgl1-mesa-dri

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run guide export
        # `runGuideExport` is registered in neoforge/build.gradle.kts. It boots
        # the client, exports every page to `build/guide/`, then exits.
        run: DRI_PRIME=0 xvfb-run --auto-servernum ./gradlew :neoforge:runGuideExport --no-daemon

      - name: Upload Pages artifact
        # `actions/upload-pages-artifact` tars the dir into the format the
        # `deploy-pages` action expects.
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/guide

  deploy:
    name: Deploy to GitHub Pages
    needs: export
    runs-on: ubuntu-24.04
    permissions:
      # `pages: write` + `id-token: write` are the minimum perms `deploy-pages`
      # needs. `contents: read` is implicit but spelled out for clarity.
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
