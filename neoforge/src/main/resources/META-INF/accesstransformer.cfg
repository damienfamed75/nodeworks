# Nodeworks Access Transformers

# Phase 17 (pin highlight) — expose the private BLOCK_SNIPPET pipeline builder
# so PinHighlightRenderType can construct a no-depth variant of the standard
# block pipeline, and RenderType.create(String, RenderSetup) so the RenderType
# can actually be instantiated. NeoForge opens both at runtime; mirror here so
# the Kotlin compiler can resolve the references too.
public net.minecraft.client.renderer.RenderPipelines BLOCK_SNIPPET
public net.minecraft.client.renderer.rendertype.RenderType create(Ljava/lang/String;Lnet/minecraft/client/renderer/rendertype/RenderSetup;)Lnet/minecraft/client/renderer/rendertype/RenderType;

# Phase 51 (crystal core) — MATRICES_FOG_SNIPPET is the snippet vanilla EYES builds
# off (no light-direction uniform). We need it to mirror EYES exactly for the
# depth-writing emissive variant used by the Controller crystal core, otherwise the
# light-dir uniforms from ENTITY_EMISSIVE_SNIPPET leak through and darken faces.
public net.minecraft.client.renderer.RenderPipelines MATRICES_FOG_SNIPPET

# Slot.x and Slot.y — allow repositioning slots for tab switching in NodeSideScreenHandler
public-f net.minecraft.world.inventory.Slot x
public-f net.minecraft.world.inventory.Slot y

# AbstractContainerScreen.imageWidth / imageHeight — MC 26.1 made these final
# but several of our screens (DiagnosticScreen, InventoryTerminalScreen,
# TerminalScreen) legitimately need to resize dynamically based on window
# size / selected layout. Strip the `final` so they stay writable.
public-f net.minecraft.client.gui.screens.inventory.AbstractContainerScreen imageWidth
public-f net.minecraft.client.gui.screens.inventory.AbstractContainerScreen imageHeight
