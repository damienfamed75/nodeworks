# AbstractContainerScreen.imageWidth / imageHeight — MC 26.1 made these final
# but several of our screens (DiagnosticScreen, InventoryTerminalScreen,
# TerminalScreen) legitimately need to resize dynamically based on window
# size / selected layout. Strip the `final` so they stay writable.
public-f net.minecraft.client.gui.screens.inventory.AbstractContainerScreen imageWidth
public-f net.minecraft.client.gui.screens.inventory.AbstractContainerScreen imageHeight
